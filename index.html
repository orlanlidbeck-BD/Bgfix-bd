  .nv.on { background: var(--bg); color: var(--text); font-weight: 500; box-shadow: 0 0 0 0.5px var(--border2); }

function quickLog(id,note){
  const p=P.find(x=>x.id===id);if(!p)return;
  p.logs.push({date:TDS,type:'Samtal',note});
  if(note.includes('inget svar'))p.status='Called - No Answer';
  else if(note.includes('svarade'))p.status='Answered - Follow Up';
  sv();render();
}


function updateCounts(){
  const active=P.filter(p=>p.status!=='Complete'&&p.status!=='Passed to Sales');

  Object.entries(rmap).forEach(([id,rname])=>{

}

function _ptGuess(p){
  const n=(p.name+' '+p.company).toLowerCase();
  if(/vatten|avlopp|reningsverk|va-/.test(n))return 'infrastruktur/VA';
  if(/väg|motorväg|asfalt|gata/.test(n))return 'vägarbete';
  if(/datacenter/.test(n))return 'datacenter';
  if(/bostäder|lägenheter|flerbostads|brf/.test(n))return 'bostadsbyggande';
  if(/skola|förskola|gymnasium/.test(n))return 'skolbyggnad';
  if(/industri|lager|logistik|fabrik/.test(n))return 'industribyggnad';
  return 'byggprojekt';
}

  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        messages:[{role:'user',content:'Du är e-postassistent för Orlan på BGFIX.\n\nPROJEKT: '+p.name+'\nTYP: '+pt+'\nFÖRETAG: '+(p.company||'okänt')+'\nKONTAKT: '+(p.contact||'projektledaren')+'\nVÄRDE: '+(p.value?p.value+' mSEK':'okänt')+'\nANTECKNINGAR: '+(notes||'(inga)')+'\n\nSkriv uppföljningsmejl på svenska:\nRad1: Ämnesrad: Som avtalat, [Förnamn] – BGFIX-broschyr ([2 produkter] och mycket mer)\nRad2: tom\nRad3: Hej [Förnamn],\nRad4: Tack för pratstunden om [projekt] – [naturlig mening från anteckningarna eller "det låter som ett spännande projekt"].\nRad5: Jag bifogar vår broschyr som utlovat 😊\nRad6: tom\nRad7: De flesta känner oss för stängsel, grindar och portar, men hos BGFIX kan du få lösningar för hela projektets gång, till exempel:\nRad8-11: 3-4 produktpunkter för '+pt+' (ENBART från: Byggstängsel, Grindar till byggstängsel, Portar, Lätt avspärrning, Tung avspärrning, Publikstängsel, Säkerhetsräcken, Säkerhetsprodukter för betongarbete, Soldater/däckstöd, Spaghettimattor, Gångbroar)\nRad12: tom\nRad13: Det gör inköpsprocessen enkel och effektiv för dig – och du får:\nRad14: • Ett brett sortiment med smarta lösningar\nRad15: • Konkurrenskraftiga priser\nRad16: • Leverans inom 24–48 timmar i hela Sverige och personlig service\nRad17: tom\nRad18: Du kan se hela vårt sortiment på www.bgfix.se\nRad19: tom\nRad20: Hör gärna av dig om det är något vi kan hjälpa till med, eller om du önskar en offert!\nRad21: tom\nRad22: Lycka till med projektet – fortsatt trevlig dag!\nRad23: tom\nRad24: *K.S. Om du redan har en idé om vilka produkter som är relevanta, skicka gärna en kort lista – så återkommer jag med priser och leveranstid samma dag.*\n\nREGLER: Skandinavisk ton. Du-form. Max 200 ord. ENDAST 😊 rad5. INGEN signatur. INGEN Orlan. Output=ENBART mejlet.'}]})
    });
    const d=await resp.json();
    const txt=d.content?.[0]?.text||'';
    const lines=txt.trim().split('\n');
    let subj='',body='';
    for(let i=0;i<lines.length;i++){if(lines[i].trim()){subj=lines[i].replace(/^(Ämnesrad:|Ämne:|Subject:)\s*/i,'').trim();body=lines.slice(i+1).join('\n').trim();break;}}
    const se=document.getElementById('esb-'+id);
    const be=document.getElementById('ebo-'+id);
    if(se)se.value=subj;if(be)be.value=body;
    if(ld)ld.style.display='none';
    if(out)out.style.display='flex';
  }catch(e){
    if(ld)ld.style.display='none';
    alert('Kunde inte generera mejl. Kontrollera att du är online.');
  }
}

function copyEmailDraft(id){
  const s=document.getElementById('esb-'+id)?.value||'';
  const b=document.getElementById('ebo-'+id)?.value||'';
  navigator.clipboard.writeText('Ämne: '+s+'\n\n'+b).then(()=>{
    const btn=document.getElementById('ecp-'+id);
    if(btn){const orig=btn.innerHTML;btn.innerHTML='✓ Kopierat!';btn.style.cssText='background:#1D9E75;border-color:#1D9E75;color:#fff;font-size:12px';
    setTimeout(()=>{btn.innerHTML=orig;btn.removeAttribute('style');},3000);}
  });
}

function go(v){
  if(v!==V&&!v.startsWith('proj_'))prevV=V;
  V=v;
  document.querySelectorAll('.nv').forEach(n=>n.classList.toggle('on',n.getAttribute('data-v')===v));
  document.getElementById('tc').textContent=P.filter(isToday).length;
  render();
  setTimeout(updateCounts,50);
}

const TITLES={dash:'Dashboard',today:'Ring idag',pipeline:'Pipeline',all:'Alla projekt',orlan:'Orlans projekt',sales:'Passed to Sales',archive:'Arkiv',import:'Importera',add:'Lägg till projekt',search:'Sök projekt'};

function render(){
  const ct=document.getElementById('ct');
  const pt=document.getElementById('pt');
  if(TITLES[V])pt.textContent=TITLES[V];
  else if(REGS.includes(V))pt.textContent=V;
  else if(V.startsWith('proj_'))pt.textContent='Projekt';
  if(V==='dash')ct.innerHTML=rDash();
  else if(V==='today')ct.innerHTML=rToday(_ts,_tr,_tsf);
  else if(V==='pipeline')ct.innerHTML=rPipeline();
  else if(V==='all')ct.innerHTML=rList(P.filter(p=>p.status!=='Complete'&&p.status!=='Passed to Sales'));
  else if(V==='orlan')ct.innerHTML=rList(P.filter(p=>p.assignee==='Orlan'&&p.status!=='Complete'&&p.status!=='Passed to Sales'),true);
  else if(REGS.includes(V))ct.innerHTML=rList(P.filter(p=>p.region===V&&p.status!=='Complete'&&p.status!=='Passed to Sales'));
  else if(V==='sales')ct.innerHTML=rSales();
  else if(V==='archive')ct.innerHTML=rArchive();
  else if(V==='import')ct.innerHTML=rImport();
  else if(V==='add')ct.innerHTML=rAdd();
  else if(V==='search')ct.innerHTML=rSearch();
  else if(V.startsWith('proj_'))ct.innerHTML=rProj(parseInt(V.slice(5)));
}

function rDash(){
  const active=P.filter(p=>p.status!=='Complete'&&p.status!=='Passed to Sales');
  const ring=P.filter(isToday).length;
  const totalVal=active.reduce((s,p)=>s+(p.value||0),0);
  const ptsVal=P.filter(p=>p.status==='Passed to Sales').reduce((s,p)=>s+(p.value||0),0);
  const allanN=P.filter(p=>p.assignee==='Orlan'&&p.status!=='Complete'&&p.status!=='Passed to Sales').length;
  const orlanN=P.filter(p=>p.assignee==='Orlan'&&p.status!=='Complete'&&p.status!=='Passed to Sales').length;
  const bnr=LAST_WEEK?`<div class="bnr"><i class="ti ti-bell" style="font-size:18px;color:#854F0B;flex-shrink:0"></i><div><div style="font-size:13px;font-weight:600;color:#633806">Sista veckan i månaden</div><div style="font-size:12px;color:#854F0B">Exportera nästa månads projekt från Byggfakta och importera.</div></div><button class="btn" style="margin-left:auto;flex-shrink:0" onclick="go('import')">Importera nu</button></div>`:'';
  const maxN=Math.max(...KBCOLS.map(s=>P.filter(p=>p.status===s).length),1);
  const funnel=KBCOLS.map(s=>{const n=P.filter(p=>p.status===s).length;const v=P.filter(p=>p.status===s).reduce((a,p)=>a+(p.value||0),0);const w=Math.max(Math.round(n/maxN*100),4);return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px"><div style="font-size:11px;color:var(--text2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s}</div><div style="flex:1;height:14px;background:var(--bg3);border-radius:3px;overflow:hidden"><div style="height:100%;width:${w}%;background:var(--orange);border-radius:3px"></div></div><div style="font-size:11px;font-weight:600;color:var(--text);width:16px;text-align:right">${n}</div><div style="font-size:10px;color:var(--text3);width:55px;text-align:right">${v?v+'m':''}</div></div>`;}).join('');
  const rgRows=REGS.map(r=>{const tot=P.filter(p=>p.region===r).length;const d=P.filter(p=>p.region===r&&(p.status==='Complete'||p.status==='Passed to Sales')).length;const rv=P.filter(p=>p.region===r&&p.status!=='Complete'&&p.status!=='Passed to Sales').reduce((a,p)=>a+(p.value||0),0);const pv=tot?Math.round(d/tot*100):0;return `<div class="pgrow"><div class="pglbl"><span class="rdot" style="background:${RC[r]}"></span>${r}</div><div class="pgbg"><div class="pgfill" style="width:${pv}%;background:${RC[r]}"></div></div><div class="pgpct">${pv}%</div><div style="font-size:10px;color:var(--text3);width:45px;text-align:right;flex-shrink:0">${rv?rv+'m':''}</div></div>`;}).join('');
  const urgRows=P.filter(p=>isToday(p)&&p.priority==='High').slice(0,3).map(p=>prow(p,'hot',true)).join('');
  return `${bnr}<div class="sg">
    <div class="sc"><div class="sc-l">Aktiva projekt</div><div class="sc-n">${active.length}</div><div class="sc-s">${totalVal} mSEK pipeline</div></div>
    <div class="sc"><div class="sc-l">Ring idag</div><div class="sc-n" style="color:#E24B4A">${ring}</div></div>
    
    <div class="sc"><div class="sc-l">Orlan</div><div class="sc-n" style="color:#27500A">${orlanN}</div><div class="sc-s">aktiva projekt</div></div>
    <div class="sc"><div class="sc-l">Passed to Sales</div><div class="sc-n" style="color:#534AB7">${P.filter(p=>p.status==='Passed to Sales').length}</div><div class="sc-s">${ptsVal} mSEK</div></div>
    <div class="sc"><div class="sc-l">Complete</div><div class="sc-n" style="color:#1D9E75">${P.filter(p=>p.status==='Complete').length}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card"><div class="sec" style="margin-top:0">Pipeline — antal · värde</div>${funnel}</div>
    <div class="card"><div class="sec" style="margin-top:0">Framsteg per region</div>${rgRows}</div>
  </div>
  <div class="sec">Ring idag — hög prioritet</div>
  ${urgRows||'<div class="card" style="font-size:13px;color:var(--text2);text-align:center;padding:24px">Inga hög-prioritet projekt att ringa just nu.</div>'}
  <button class="btn" style="margin-top:10px" onclick="go('today')">Visa alla att ringa idag →</button>`;
}

function rToday(sb,rf,sf){
  sb=sb||'priority';rf=rf||'Alla';sf=sf||'Alla';
  let list=P.filter(isToday).slice();
  if(rf!=='Alla') list=list.filter(p=>p.region===rf);
  if(sf!=='Alla') list=list.filter(p=>p.status===sf);
  // Region filter
  if(rf!=='Alla') list=list.filter(p=>p.region===rf);
  // Sort
  if(sb==='value') list.sort((a,b)=>(b.value||0)-(a.value||0));
  else if(sb==='start') list.sort((a,b)=>(a.start||'9').localeCompare(b.start||'9'));
  else list.sort((a,b)=>(a.priority==='High'?0:a.priority==='Medium'?1:2)-(b.priority==='High'?0:b.priority==='Medium'?1:2));

  if(!list.length&&rf==='Alla') return '<div class="card" style="text-align:center;padding:48px 24px"><div style="font-size:15px;font-weight:600;margin-bottom:5px">Inga projekt att ringa idag</div><div style="font-size:13px;color:var(--text2)">Projekt som startar maj 2026–'+NM+' visas här automatiskt.</div></div>';
  if(!list.length) return '<div class="card" style="text-align:center;padding:24px;font-size:13px;color:var(--text2)">Inga projekt i '+rf+' att ringa just nu.</div>';

  // Sort bar
  const p1='<button class="btn '+(sb==='priority'?'btn-or':'')+'" style="font-size:11px;padding:4px 10px" onclick="rTodaySort(&quot;priority&quot;)">Prioritet</button>';
  const p2='<button class="btn '+(sb==='value'?'btn-or':'')+'" style="font-size:11px;padding:4px 10px" onclick="rTodaySort(&quot;value&quot;)">Värde ↓</button>';
  const p3='<button class="btn '+(sb==='start'?'btn-or':'')+'" style="font-size:11px;padding:4px 10px" onclick="rTodaySort(&quot;start&quot;)">Startdatum</button>';
  const sortBar='<div style="display:flex;gap:6px;margin-bottom:8px;align-items:center;flex-wrap:wrap"><span style="font-size:12px;color:var(--text2)">Sortera:</span>'+p1+p2+p3+'<span style="margin-left:auto;font-size:12px;color:var(--text2)">'+list.length+' projekt</span></div>';

  // Region filter bar
  const regions=['Alla','Stockholm','Norrland','Mellersta','Göteborg','Skåne'];
  const regionColors={Stockholm:'#378ADD',Norrland:'#639922',Mellersta:'#BA7517',Göteborg:'#D4537E',Skåne:'#7F77DD'};
  let rgBar='<div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;align-items:center"><span style="font-size:12px;color:var(--text2)">Region:</span>';
  regions.forEach(r=>{
    const active=rf===r;
    const dot=r!=='Alla'?'<span style="width:7px;height:7px;border-radius:50%;background:'+(regionColors[r]||'#999')+';display:inline-block;margin-right:3px"></span>':'';
    rgBar+='<button class="btn '+(active?'btn-or':'')+'" style="font-size:11px;padding:4px 10px" onclick="rTodayRegion(&quot;'+r+'&quot;)">'+dot+r+'</button>';
  });
  rgBar+='</div>';

  const info='<div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--text2)">Visar projekt som startar <strong>maj 2026</strong> – <strong>'+NM+'</strong>, plus schemalagda följ-upp.</div>';

  const fu=list.filter(p=>p.followup===TDS);
  const mo=list.filter(p=>p.followup!==TDS);
  const statuses=['Alla','Ready to Call','Called - No Answer','Answered - Follow Up'];
  let sfBar='<div style="display:flex;gap:5px;margin-bottom:8px;flex-wrap:wrap;align-items:center"><span style="font-size:12px;color:var(--text2)">Status:</span>';
  statuses.forEach(s=>{sfBar+='<button class="btn '+((sf||'Alla')===s?'btn-or':'')+'" style="font-size:11px;padding:4px 10px" onclick="rTodayStatus(&quot;'+s+'&quot;)">'+s+'</button>';});
  sfBar+='</div>';
  let h=info+sortBar+sfBar+rgBar;
  if(fu.length){h+='<div class="sec">Schemalagda följ-upp idag ('+fu.length+')</div>';fu.forEach(p=>{h+=prow(p,'fu',true);});}
  if(mo.length){h+='<div class="sec" style="margin-top:'+(fu.length?'12px':'0')+'">Startar maj–'+NM+' ('+mo.length+')</div>';mo.forEach(p=>{h+=prow(p,p.priority==='High'?'hot':'',true);});}
  return h;
}


function rPipeline(){

  KBCOLS.forEach(status=>{
    const cards=P.filter(p=>p.status===status);
    const totVal=cards.reduce((a,p)=>a+(p.value||0),0);
    const cardH=cards.map(p=>`<div class="kbcard" onclick="go('proj_${p.id}')">
      <div class="kbcn">${p.name}</div>
      <div class="kbco">${p.company||'—'}</div>
      <div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px">
        <span style="font-size:9px;padding:1px 5px;border-radius:10px;background:${RC[p.region]+'22'};color:${RC[p.region]};border:0.5px solid ${RC[p.region]}40">${p.region}</span>
        ${p.value>=200?`<span style="font-size:9px;padding:1px 5px;border-radius:10px;background:#E6F1FB;color:#0C447C">${p.value}m</span>`:''}
        ${p.priority==='High'?`<span style="font-size:9px;padding:1px 5px;border-radius:10px;background:#FCEBEB;color:#A32D2D">Hög</span>`:''}
        ${p.assignee?`<span style="font-size:9px;padding:1px 5px;border-radius:10px;background:${p.assignee==='Orlan'?'#EEEDFE':'#EAF3DE'};color:${p.assignee==='Orlan'?'#3C3489':'#27500A'}">${p.assignee}</span>`:''}
      </div>
      <div style="height:3px;background:var(--bg3);border-radius:2px;overflow:hidden"><div style="height:100%;width:${PROG[status]}%;background:${PROG[status]===100?'#1D9E75':'var(--orange)'};border-radius:2px"></div></div>

function rList(list,isOrlan){
  const totalVal=list.reduce((a,p)=>a+(p.value||0),0);
  const fRow=`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center">
    <span style="font-size:12px;color:var(--text2)">Filter:</span>
    ${['Alla',...ST.filter(s=>s!=='Complete'&&s!=='Passed to Sales')].map(s=>`<span style="padding:4px 10px;border-radius:20px;font-size:11px;border:0.5px solid var(--border2);cursor:pointer;color:var(--text2);background:var(--bg);transition:background 0.1s" onclick="filt('${s}',this)">${s}${s==='Alla'?' ('+list.length+')':''}</span>`).join('')}
    ${totalVal?`<span style="margin-left:auto;font-size:12px;color:var(--text2)">Totalt: <strong style="color:var(--text)">${totalVal} mSEK</strong></span>`:''}
  </div>`;
  return fRow+(list.map(p=>prow(p,p.priority==='High'?'hot':'',isOrlan)).join('')||'<div class="card" style="font-size:13px;color:var(--text2);text-align:center;padding:24px">Inga projekt.</div>');
}

function filt(s,el){
  document.querySelectorAll('.ct [onclick*="filt"]').forEach(e=>{e.style.background='';e.style.color='var(--text2)';e.style.borderColor='var(--border2)';});
  el.style.background='var(--orange)';el.style.color='#fff';el.style.borderColor='var(--orange)';
  document.querySelectorAll('.pr').forEach(r=>{
    if(s==='Alla'){r.style.display='';return;}
    const c=r.querySelector('.chip');r.style.display=(c&&c.textContent===s)?'':'none';
  });
}

function rSearch(){
  return `<div class="search-wrap"><i class="ti ti-search" style="font-size:16px;color:var(--text2)"></i><input id="sq" placeholder="Sök projektnamn, företag, beställare, kontakt..." oninput="doSearch(this.value)" autofocus style="font-size:14px"></div><div id="sr"><div style="font-size:13px;color:var(--text2)">Börja skriva för att söka bland ${P.length} projekt...</div></div>`;

function doSearch(q){
  const sr=document.getElementById('sr');
  if(!q||q.length<2){sr.innerHTML=`<div style="font-size:13px;color:var(--text2)">Börja skriva...</div>`;return;}
  const ql=q.toLowerCase();
  const res=P.filter(p=>[p.name,p.company,p.bestallare,p.contact,p.region,p.notes].some(f=>f&&f.toLowerCase().includes(ql)));
  sr.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">${res.length} träffar för "${q}"</div>`+(res.map(p=>prow(p,'')).join('')||'<div style="font-size:13px;color:var(--text2)">Inga träffar.</div>');
}

  const p=P.find(x=>x.id===id);if(!p)return '<div>Projekt ej hittat.</div>';

  const tl=p.logs.slice().reverse().map((l,i,arr)=>`<div class="tli"><div class="tldc"><div class="tld" style="background:${ACOL[l.type]||'#888'}"></div>${i<arr.length-1?'<div class="tll"></div>':''}</div><div style="flex:1"><div class="tdate">${l.date} · <span style="color:${ACOL[l.type]||'#888'};font-weight:500">${l.type}</span></div><div class="tnote">${l.note}</div></div></div>`).join('');

  const urlBar=p.url?`<div class="url-bar"><i class="ti ti-external-link" style="font-size:14px;color:#185FA5;flex-shrink:0"></i><span style="font-size:12px;color:var(--text2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${p.url}</span><a href="${p.url}" target="_blank" style="display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;border-radius:var(--radius);border:0.5px solid #85B7EB;background:#E6F1FB;color:#0C447C;text-decoration:none;white-space:nowrap;flex-shrink:0"><i class="ti ti-external-link" style="font-size:12px"></i> Öppna i Byggfakta</a></div>`:`<div class="url-bar"><span style="font-size:12px;color:var(--text2);flex:1">Ingen Byggfakta-länk sparad</span><button class="btn" onclick="addUrl(${id})"><i class="ti ti-plus" style="font-size:12px"></i> Lägg till URL</button></div>`;

  const mailBox=p.status==='Passed to Sales'?`<div class="mail-box">
    <div style="font-size:12px;font-weight:600;color:#27500A;margin-bottom:10px;display:flex;align-items:center;gap:6px"><i class="ti ti-mail"></i> Skicka till säljteamet</div>

  </div>`:'';

  return `<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">

        <div><div style="font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:500">Telefon</div><div style="font-size:13px">${p.phone||'—'}</div></div>
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:500">Startar</div><div style="font-size:13px">${p.start||'—'}</div></div>
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:500">Värde</div><div style="font-size:13px;font-weight:600">${p.value?p.value+' mSEK':'—'}</div></div>
        <div><div style="font-size:11px;color:var(--text2);margin-bottom:2px;font-weight:500">Region</div><div style="font-size:13px">${p.region}</div></div>
      </div>
      ${p.notes?`<div style="font-size:12px;color:var(--text2);background:var(--bg2);padding:9px 11px;border-radius:var(--radius);margin-top:10px;border:0.5px solid var(--border)">${p.notes}</div>`:''}
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:12px">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
        <div class="fld"><label>Status</label><select onchange="updS(${id},this.value)">${sOpts}</select></div>
        <div class="fld"><label>Prioritet</label><select onchange="updF(${id},'priority',this.value)">${prOpts}</select></div>
        <div class="fld"><label>Ansvarig</label><select onchange="updF(${id},'assignee',this.value)">${asOpts}</select></div>

      <div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-size:11px;color:var(--text2);font-weight:500">Framsteg</span>

          <div id="pb${id}" style="height:100%;width:${pv}%;background:${pv===100?'#1D9E75':'var(--orange)'};border-radius:4px;transition:width 0.4s"></div>

        <div style="font-size:11px;color:var(--text3);margin-top:3px">Uppdateras automatiskt med status</div>
      </div>

      <div class="fld"><label>Anteckningar</label>
        <textarea onchange="updF(${id},'notes',this.value)">${p.notes||''}</textarea></div>
    </div>
  </div>

  <div class="card">

    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px">
      <select id="at${id}" style="font-size:12px;padding:6px 9px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit">${ACTS.map(t=>`<option>${t}</option>`).join('')}</select>
      <input id="an${id}" placeholder="Skriv anteckning... (Enter = spara)" onkeydown="if(event.key==='Enter'){event.preventDefault();addLog(parseInt(this.id.replace('an','')));}" style="flex:1;min-width:150px;font-size:12px;padding:6px 10px;border:0.5px solid var(--border2);border-radius:var(--radius);background:var(--bg);color:var(--text);font-family:inherit">

function copyMail(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  const wish=document.getElementById('mw'+id)?.value.trim()||'';
  const txt=buildMailText(p,wish);
  const prev=document.getElementById('mprev'+id);
  if(prev)prev.textContent=txt;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('cpbtn'+id);
    if(btn){btn.classList.add('copied');btn.innerHTML='<i class="ti ti-check"></i> Kopierat!';setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<i class="ti ti-copy"></i> Kopiera mejl';},3000);}
  }).catch(()=>{if(prev){prev.select&&prev.select();} alert('Markera texten i förhandsgranskningen och kopiera med Ctrl+C.');});
}

function updMailPreview(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  const wish=document.getElementById('mw'+id)?.value.trim()||'';
  const prev=document.getElementById('mprev'+id);if(prev)prev.textContent=buildMailText(p,wish);
}

function addUrl(id){const url=prompt('Klistra in Byggfakta URL:');if(!url||!url.trim())return;const p=P.find(x=>x.id===id);if(p){p.url=url.trim();sv();go('proj_'+id);}}
function updS(id,val){const p=P.find(x=>x.id===id);if(!p)return;p.status=val;sv();const pv=pc(p);const pb=document.getElementById('pb'+id);const pp=document.getElementById('pp'+id);if(pb){pb.style.width=pv+'%';pb.style.background=pv===100?'#1D9E75':'var(--orange)';}if(pp)pp.textContent=pv+'%';document.getElementById('tc').textContent=P.filter(isToday).length;render();}
function updF(id,f,v){const p=P.find(x=>x.id===id);if(p){p[f]=v;sv();}document.getElementById('tc').textContent=P.filter(isToday).length;}
function bookM(id){const d=document.getElementById('md'+id);if(!d||!d.value)return;const p=P.find(x=>x.id===id);if(p){p.logs.push({date:TDS,type:'Möte',note:'Möte bokat: '+d.value});p.followup=d.value;sv();go('proj_'+id);}}
function addLog(id){const t=document.getElementById('at'+id);const n=document.getElementById('an'+id);if(!n||!n.value.trim())return;const p=P.find(x=>x.id===id);if(p){p.logs.push({date:TDS,type:t.value,note:n.value.trim()});sv();const tl=document.getElementById('tl'+id);const c=ACOL[t.value]||'#888';if(tl)tl.insertAdjacentHTML('afterbegin',`<div class="tli"><div class="tldc"><div class="tld" style="background:${c}"></div></div><div style="flex:1"><div class="tdate">${TDS} · <span style="color:${c};font-weight:500">${t.value}</span></div><div class="tnote">${n.value.trim()}</div></div></div>`);n.value='';}}

function exportCSV(){
  const active=P.filter(p=>p.status!=='Complete');
  const rows=[['Projektnamn','Beställare','Totalentreprenör','Platschef','Telefon','Status','Prioritet','Region','Startar','Värde (mSEK)','Framsteg %','Följ-upp','Notes','Byggfakta URL','Ansvarig']];
  active.forEach(p=>rows.push([p.name,p.bestallare||'',p.company||'',p.contact||'',p.phone||'',p.status,p.priority,p.region,p.start||'',p.value||'',pc(p),p.followup||'',p.notes||'',p.url||'',p.assignee||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='BGFIX_Export_'+TDS+'.csv';a.click();
}

function rImport(){return `<div style="max-width:460px"><div class="card" style="margin-bottom:14px"><div style="font-size:14px;font-weight:600;margin-bottom:5px">Importera från Byggfakta</div><div style="font-size:13px;color:var(--text2);margin-bottom:14px">Bara nya projekt läggs till — befintliga noteringar och statusar berörs inte.</div><div class="idrop" onclick="this.nextElementSibling.click()"><i class="ti ti-upload" style="font-size:28px;color:var(--text2);display:block;margin:0 auto 8px"></i><div style="font-size:14px;color:var(--text2)">Klicka för att välja .xlsx fil</div><div style="font-size:12px;color:var(--text3);margin-top:4px">Exportera från Byggfakta SMART och ladda upp här</div></div><input type="file" accept=".xlsx" style="display:none" onchange="setTimeout(()=>alert('Ladda upp filen i chatten till Claude — Claude sorterar in nya projekt automatiskt utan att röra befintliga noteringar.'),200)"></div><div style="background:#FFF3CD;border:0.5px solid var(--orange);border-radius:var(--radius);padding:11px 14px;font-size:12px;color:#633806"><strong>Hur du exporterar:</strong><br>1. Gå till Byggfakta SMART<br>2. Filtrera på nästa månads startdatum<br>3. Exportera som Excel (.xlsx)<br>4. Ladda upp filen i denna chatt till Claude</div></div>`;}

function saveNew(){
  const name=document.getElementById('f0').value.trim();if(!name){alert('Projektnamn krävs');return;}
  P.unshift({id:Date.now(),name,company:document.getElementById('f1').value.trim(),bestallare:document.getElementById('fb').value.trim(),contact:document.getElementById('f3').value.trim(),phone:document.getElementById('f4').value.trim(),status:document.getElementById('f6').value,priority:document.getElementById('f7').value,region:document.getElementById('f5').value,start:document.getElementById('f8').value.trim(),value:parseInt(document.getElementById('f2').value)||0,url:document.getElementById('f10').value.trim(),followup:document.getElementById('f9').value||'',notes:document.getElementById('f11').value.trim(),assignee:document.getElementById('fa').value,logs:[]});
  sv();go('all');
}

const _up=new URLSearchParams(window.location.search).get('proj');if(_up){go('proj_'+_up);}else{go('dash');}updateCounts();
