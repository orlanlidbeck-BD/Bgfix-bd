<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGFIX BD — BigFactor Pipeline</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f5f5;
    --bg3: #ebebeb;
    --text: #1a1a1a;
    --text2: #666666;
    --text3: #999999;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --orange: #F9A800;
    --orange-dark: #c98900;
    --radius: 8px;
    --radius-lg: 12px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a1a;
      --bg2: #242424;
      --bg3: #2e2e2e;
      --text: #f0f0f0;
      --text2: #aaaaaa;
      --text3: #666666;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg3); color: var(--text); min-height: 100vh; }
  .app { display: flex; height: 100vh; overflow: hidden; }

  /* Sidebar */
  .sb { width: 200px; background: var(--bg2); border-right: 0.5px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; }
  .sb-logo { padding: 16px 14px 12px; font-size: 15px; font-weight: 600; color: var(--text); border-bottom: 0.5px solid var(--border); margin-bottom: 6px; letter-spacing: -0.3px; }
  .sb-logo span { color: var(--orange); }
  .nv { display: flex; align-items: center; gap: 8px; padding: 7px 11px; font-size: 13px; cursor: pointer; border-radius: var(--radius); margin: 1px 6px; color: var(--text2); transition: background 0.12s, color 0.12s; }
  .nv:hover { background: var(--bg3); color: var(--text); }
  .nv.on { background: var(--bg); color: var(--text); font-weight: 500; box-shadow: 0 0 0 0.5px var(--border2); }
  .nv i { font-size: 15px; flex-shrink: 0; }
  .bc { margin-left: auto; background: #E24B4A; color: #fff; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; }
  .sb-sec { padding: 10px 11px 3px; font-size: 10px; color: var(--text3); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  .rdot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* Main */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .topbar { display: flex; align-items: center; gap: 8px; padding: 11px 18px; border-bottom: 0.5px solid var(--border); background: var(--bg); flex-shrink: 0; }
  .tb-title { font-size: 15px; font-weight: 600; flex: 1; color: var(--text); letter-spacing: -0.2px; }
  .ct { flex: 1; overflow-y: auto; padding: 18px; background: var(--bg3); }

  /* Buttons */
  .btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 12px; font-size: 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; color: var(--text); transition: background 0.12s; font-family: inherit; }
  .btn:hover { background: var(--bg2); }
  .btn-or { background: var(--orange); border-color: var(--orange); color: #fff; font-weight: 600; }
  .btn-or:hover { background: var(--orange-dark); border-color: var(--orange-dark); }
  .btn-gr { background: #3B6D11; border-color: #3B6D11; color: #EAF3DE; }
  .btn-gr:hover { background: #27500A; }
  .btn-bl { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; }
  .btn-cp { background: #EAF3DE; border-color: #97C459; color: #27500A; font-weight: 500; }
  .btn-cp.copied { background: #1D9E75; border-color: #1D9E75; color: #fff; }

  /* Cards */
  .sg { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .sc { background: var(--bg); border-radius: var(--radius); padding: 12px 14px; border: 0.5px solid var(--border); }
  .sc-l { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .sc-n { font-size: 22px; font-weight: 600; color: var(--text); }
  .sc-s { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* Section label */
  .sec { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; margin: 14px 0 7px; }

  /* Project rows */
  .pr { display: flex; flex-direction: column; gap: 4px; padding: 9px 12px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--bg); margin-bottom: 4px; cursor: pointer; transition: border-color 0.12s, box-shadow 0.12s; }
  .pr:hover { border-color: var(--border2); box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .pr.hot { border-left: 3px solid #E24B4A; padding-left: 10px; }
  .pr.fu { border-left: 3px solid var(--orange); padding-left: 10px; }
  .pr.dim { opacity: 0.5; }
  .pr-top { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .pname { font-size: 13px; font-weight: 500; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .pco { font-size: 11px; color: var(--text2); width: 100px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }
  .chip { display: inline-flex; align-items: center; padding: 2px 8px; border-radius: 20px; font-size: 10px; font-weight: 500; white-space: nowrap; flex-shrink: 0; }
  .s0{background:#FFF3CD;color:#633806}.s1{background:#EAF3DE;color:#27500A}.s2{background:#FAEEDA;color:#633806}.s3{background:#E6F1FB;color:#0C447C}.s4{background:#EEEDFE;color:#3C3489}.s5{background:#E1F5EE;color:#085041}.s6{background:#F1EFE8;color:#444441}
  .srg { background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); }

  /* Progress */
  .pgrow { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
  .pglbl { font-size: 12px; color: var(--text2); width: 90px; display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .pgbg { flex: 1; height: 5px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
  .pgfill { height: 100%; border-radius: 3px; }
  .pgpct { font-size: 10px; color: var(--text2); width: 28px; text-align: right; }

  /* Banner */
  .bnr { background: #FFF3CD; border: 0.5px solid var(--orange); border-radius: var(--radius); padding: 11px 14px; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }

  /* Kanban */
  .kb { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 8px; align-items: start; }
  .kbc { background: var(--bg2); border-radius: var(--radius); padding: 8px; min-height: 100px; border: 0.5px solid var(--border); }
  .kbh { font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; }
  .kbcard { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 7px 8px; margin-bottom: 4px; cursor: pointer; transition: border-color 0.12s; }
  .kbcard:hover { border-color: var(--border2); }
  .kbcn { font-size: 11px; font-weight: 500; color: var(--text); margin-bottom: 3px; line-height: 1.3; }
  .kbco { font-size: 10px; color: var(--text2); margin-bottom: 4px; }

  /* Forms */
  .fld label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 3px; font-weight: 500; }
  .fld input, .fld select, .fld textarea { width: 100%; font-size: 13px; padding: 7px 10px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); font-family: inherit; outline: none; transition: border-color 0.12s; }
  .fld input:focus, .fld select:focus, .fld textarea:focus { border-color: var(--orange); box-shadow: 0 0 0 2px rgba(249,168,0,0.15); }
  .fld textarea { resize: vertical; min-height: 60px; }

  /* Timeline */
  .tli { display: flex; gap: 10px; margin-bottom: 8px; }
  .tldc { display: flex; flex-direction: column; align-items: center; width: 16px; flex-shrink: 0; }
  .tld { width: 10px; height: 10px; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
  .tll { flex: 1; width: 1px; background: var(--border); margin: 3px 0; }
  .tdate { font-size: 10px; color: var(--text2); margin-bottom: 2px; }
  .tnote { font-size: 12px; color: var(--text); }

  /* Misc */
  .mtgb { background: #E6F1FB; border: 0.5px solid #85B7EB; border-radius: var(--radius); padding: 10px 13px; margin: 8px 0; }
  .idrop { border: 2px dashed var(--border2); border-radius: var(--radius); padding: 28px; text-align: center; cursor: pointer; margin-bottom: 12px; transition: border-color 0.12s; }
  .idrop:hover { border-color: var(--orange); }
  .url-bar { display: flex; align-items: center; gap: 9px; padding: 8px 11px; background: var(--bg2); border-radius: var(--radius); border: 0.5px solid var(--border); margin-bottom: 12px; }
  .mail-box { background: #EAF3DE; border: 0.5px solid #97C459; border-radius: var(--radius); padding: 12px 14px; margin: 9px 0; }
  .mail-preview { background: var(--bg); border: 0.5px solid #97C459; border-radius: var(--radius); padding: 11px 13px; margin-top: 9px; font-size: 12px; color: var(--text); white-space: pre-wrap; line-height: 1.65; max-height: 220px; overflow-y: auto; font-family: monospace; }
  .owner-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 20px; font-size: 10px; background: #FAEEDA; color: #633806; border: 0.5px solid #EF9F27; }
  .qlog-btn { padding: 4px 9px; font-size: 10px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--bg); cursor: pointer; color: var(--text2); white-space: nowrap; font-family: inherit; transition: background 0.1s; }
  .qlog-btn:hover { background: var(--bg2); color: var(--text); }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }

  /* Search */
  .search-wrap { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: var(--bg); border-radius: var(--radius); border: 0.5px solid var(--border2); margin-bottom: 12px; }
  .search-wrap input { flex: 1; font-size: 13px; border: none; background: transparent; color: var(--text); outline: none; font-family: inherit; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="app">
<div class="sb">
  <div class="sb-logo">BG<span>FIX</span> BD</div>
  <div class="nv" data-v="dash" onclick="go('dash')"><i class="ti ti-layout-dashboard"></i> Dashboard</div>
  <div class="nv" data-v="today" onclick="go('today')"><i class="ti ti-alarm"></i> Ring idag <span class="bc" id="tc">0</span></div>
  <div class="nv" data-v="pipeline" onclick="go('pipeline')"><i class="ti ti-layout-kanban"></i> Pipeline</div>
  <div class="nv" data-v="all" onclick="go('all')"><i class="ti ti-building"></i> Alla projekt</div>
  <div class="nv" data-v="orlan" onclick="go('orlan')"><i class="ti ti-user"></i> Mina projekt</div>
  <div class="nv" data-v="sales" onclick="go('sales')"><i class="ti ti-star"></i> Passed to Sales</div>
  <div class="nv" data-v="archive" onclick="go('archive')"><i class="ti ti-archive"></i> Arkiv</div>
  <div class="sb-sec">Regioner</div>
  <div class="nv" data-v="Stockholm" onclick="go('Stockholm')"><span class="rdot" style="background:#378ADD"></span> Stockholm</div>
  <div class="nv" data-v="Norrland" onclick="go('Norrland')"><span class="rdot" style="background:#639922"></span> Norrland</div>
  <div class="nv" data-v="Mellersta" onclick="go('Mellersta')"><span class="rdot" style="background:#BA7517"></span> Mellersta</div>
  <div class="nv" data-v="Göteborg" onclick="go('Göteborg')"><span class="rdot" style="background:#D4537E"></span> Göteborg</div>
  <div class="nv" data-v="Skåne" onclick="go('Skåne')"><span class="rdot" style="background:#7F77DD"></span> Skåne</div>
  <div style="margin-top:auto;padding-bottom:8px;border-top:0.5px solid var(--border);margin-top:12px;padding-top:8px">
    <div class="nv" data-v="search" onclick="go('search')"><i class="ti ti-search"></i> Sök</div>
    <div class="nv" data-v="import" onclick="go('import')"><i class="ti ti-upload"></i> Importera</div>
    <div class="nv" data-v="add" onclick="go('add')"><i class="ti ti-plus"></i> Lägg till</div>
  </div>
</div>
<div class="main">
  <div class="topbar">
    <span class="tb-title" id="pt">Dashboard</span>
    <button class="btn" onclick="exportCSV()"><i class="ti ti-download"></i> Exportera</button>
    <button class="btn" onclick="go('search')"><i class="ti ti-search"></i> Sök</button>
    <button class="btn btn-or" onclick="go('add')"><i class="ti ti-plus"></i> Nytt projekt</button>
  </div>
  <div class="ct" id="ct"></div>
</div>
</div>

<script>
const RC={Stockholm:'#378ADD',Norrland:'#639922',Mellersta:'#BA7517','Göteborg':'#D4537E','Skåne':'#7F77DD'};
const REGS=Object.keys(RC);
const ST=['Find Contact','Ready to Call','Called - No Answer','Answered - Follow Up','Passed to Sales','Complete','Wrong Contact'];
const SCLS=['s0','s1','s2','s3','s4','s5','s6'];
const PROG={'Find Contact':0,'Ready to Call':10,'Called - No Answer':25,'Answered - Follow Up':50,'Passed to Sales':100,'Complete':100,'Wrong Contact':0};
const KBCOLS=['Find Contact','Ready to Call','Called - No Answer','Answered - Follow Up','Passed to Sales','Complete'];
const ACTS=['Samtal','Email','Möte','Merchbox','Anteckning','Följ upp'];
const ACOL={Samtal:'#3B6D11',Email:'#185FA5','Möte':'#854F0B',Merchbox:'#993556',Anteckning:'#5F5E5A','Följ upp':'#A32D2D'};

function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
const NOW=new Date();
const TM=`${NOW.getFullYear()}-${String(NOW.getMonth()+1).padStart(2,'0')}`;
const NM=(()=>{const d=new Date(NOW);d.setMonth(d.getMonth()+1);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;})();
const TDS=NOW.toISOString().slice(0,10);
const LAST_WEEK=NOW.getDate()>new Date(NOW.getFullYear(),NOW.getMonth()+1,0).getDate()-7;

// Load project data from base64 encoded JSON
function loadProjects(){
  try {
    const b64 = document.getElementById('proj-data').textContent.trim();
    const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
    const json = new TextDecoder('utf-8').decode(bytes);
    return JSON.parse(json);
  } catch(e) {
    console.error('Failed to load projects:', e);
    return [];
  }
}
const SAMPLE = loadProjects();


let P=(() => {try{return JSON.parse(localStorage.getItem('bgfix_final')||'null')||SAMPLE;}catch(e){return SAMPLE;}})();
let V='dash';let prevV='all';
function sv(){try{localStorage.setItem('bgfix_final',JSON.stringify(P));}catch(e){}}
function isToday(p){if(p.status==='Complete'||p.status==='Passed to Sales')return false;if(p.followup===TDS)return true;if((p.start===TM||p.start===NM)&&p.status!=='Wrong Contact'&&p.status!=='Find Contact')return true;if(!p.start&&p.priority==='High'&&(p.status==='Ready to Call'||p.status==='Called - No Answer'))return true;return false;}
function pc(p){return PROG[p.status]||0;}
function chip(s){const i=ST.indexOf(s);return `<span class="chip ${SCLS[i]||'s6'}">${s}</span>`;}

function buildMailText(p,wish){
  const logLines=p.logs.slice(-5).map(l=>`• ${l.date} — ${l.type}: ${l.note}`).join('\n');
  return `Hej,

Jag vill passa vidare följande projektlead.

PROJEKT: ${esc(p.name)}
Beställare: ${p.bestallare||'—'}
Totalentreprenör: ${p.company||'—'}
Platschef: ${p.contact||'Ej hittad'}
Telefon: ${p.phone||'—'}
Region: ${esc(p.region)}
Startar: ${p.start||'—'}
Värde: ${p.value?p.value+' mSEK':'—'}
Byggfakta: ${p.url||'—'}

VAD KUNDEN ÖNSKAR:
${wish||'Ej angivet'}

ANTECKNINGAR:
${p.notes||'—'}

SENASTE AKTIVITET:
${logLines||'—'}`;
}

function prow(p,cls,showQuickLog){
  const pv=pc(p);
  const ql=showQuickLog?`<div style="display:flex;gap:5px;margin-top:5px" onclick="event.stopPropagation()">
    <span style="font-size:10px;color:var(--text2);align-self:center">Snabblogg:</span>
    ${['Samtal — inget svar','Samtal — svarade','Email skickat'].map(a=>`<button class="qlog-btn" onclick="quickLog(${p.id},'${a}')">${a}</button>`).join('')}
  </div>`:'';
  return `<div class="pr ${cls||''}" onclick="go('proj_${p.id}')">
    <div class="pr-top">
      <div class="pname">${esc(p.name)}</div>
      <div class="pco">${p.company||'—'}</div>
      ${chip(p.status)}
      <span class="chip srg">${esc(p.region)}</span>
      ${p.value>=200?`<span class="chip" style="background:#E6F1FB;color:#0C447C">${p.value}m</span>`:''}
      ${p.assignee?`<span class="chip" style="background:${'#EAF3DE';color:'#27500A'">${esc(p.assignee)}</span>`:''}
      ${p.followup===TDS?`<span class="chip" style="background:#FAEEDA;color:#633806"><i class="ti ti-alarm" style="font-size:10px"></i> Följ upp</span>`:''}
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <div style="flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pv}%;background:${pv===100?'#1D9E75':'var(--orange)'};border-radius:2px"></div>
      </div>
      <span style="font-size:10px;color:var(--text3)">${pv}%</span>
    </div>
    ${ql}
  </div>`;
}

function quickLog(id,note){
  const p=P.find(x=>x.id===id);if(!p)return;
  p.logs.push({date:TDS,type:'Samtal',note});
  if(note.includes('inget svar'))p.status='Called - No Answer';
  else if(note.includes('svarade'))p.status='Answered - Follow Up';
  sv();render();
}

let _ts='priority';
function rTodaySort(s){_ts=s;document.getElementById('ct').innerHTML=rToday(s);}

function _ptGuess(p){
  const n=(p.name+' '+p.company).toLowerCase();
  if(/vatten|avlopp|reningsverk|va-/.test(n))return 'infrastruktur/VA';
  if(/väg|motorväg|asfalt|gata/.test(n))return 'vägarbete';
  if(/datacenter|data.center/.test(n))return 'datacenter';
  if(/bostäder|lägenheter|flerbostads|brf/.test(n))return 'bostadsbyggande';
  if(/skola|förskola|gymnasium/.test(n))return 'skolbyggnad';
  if(/industri|lager|logistik|fabrik/.test(n))return 'industribyggnad';
  if(/hamn|tunnel|bro/.test(n))return 'infrastruktur';
  if(/kontor|fastighet|handel|köpcentrum/.test(n))return 'kommersiell fastighet';
  return 'byggprojekt';
}

function draftEmail(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  const ex=document.getElementById('emod-'+id);
  if(ex){ex.style.display='flex';return;}
  const notes=p.logs.map(l=>l.note).join('. ');
  const el=document.createElement('div');
  el.id='emod-'+id;
  el.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px';
  el.innerHTML=`<div style="background:var(--bg);border-radius:var(--radius-lg);width:620px;max-height:88vh;display:flex;flex-direction:column;border:0.5px solid var(--border2);box-shadow:0 8px 32px rgba(0,0,0,0.18)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:0.5px solid var(--border);flex-shrink:0">
      <div style="font-size:14px;font-weight:600">✉ Uppföljningsmejl</div>
      <button onclick="document.getElementById('emod-${id}').style.display='none'" style="background:none;border:none;cursor:pointer;font-size:24px;color:var(--text2);line-height:1;padding:0">×</button>
    </div>
    <div style="padding:16px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:12px">
      <div style="background:var(--bg2);border-radius:var(--radius);padding:9px 12px;font-size:12px;color:var(--text2)">
        <strong style="color:var(--text)">${esc(p.name)}</strong> · ${esc(p.company||'—')} · ${p.region}
      </div>
      <div class="fld">
        <label>Samtalsanteckningar (valfritt — gör mejlet mer personligt)</label>
        <textarea id="en-${id}" placeholder="T.ex: pratade om stängsel runt arbetsområde, ska ut på plats om 3 veckor, saknar lite diverse..." style="min-height:70px">${notes||''}</textarea>
      </div>
      <button class="btn btn-or" id="egenbtn-${id}" onclick="genEmail(${id})" style="font-size:12px;padding:8px 18px;align-self:flex-start"><i class="ti ti-sparkles"></i> Generera mejl med AI</button>
      <div id="elod-${id}" style="display:none;padding:16px;text-align:center;color:var(--text2);font-size:13px">Skriver mejl...</div>
      <div id="eout-${id}" style="display:none;display:flex;flex-direction:column;gap:8px">
        <div class="fld"><label>Ämnesrad</label><input id="esub-${id}" style="font-size:13px;font-weight:500"></div>

async function genEmail(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  const notes=document.getElementById('en-'+id)?.value||'';
  const pt=_ptGuess(p);
  const ld=document.getElementById('elod-'+id);
  const out=document.getElementById('eout-'+id);
  if(ld)ld.style.display='block';
  if(out)out.style.display='none';
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        messages:[{role:'user',content:`Du är e-postassistent för Orlan på BGFIX (svenska säkerhets- och avspärrningsprodukter för byggarbetsplatser).

Skriv ETT uppföljningsmejl på svenska efter ett första samtal.

PROJEKT: ${p.name}
TYP: ${pt}
FÖRETAG: ${p.company||'okänt'}
KONTAKT: ${p.contact||'projektledaren'}
VÄRDE: ${p.value?p.value+' mSEK':'okänt'}
ANTECKNINGAR: ${notes||'(inga)'}

EXAKT STRUKTUR — följ raderna nedan:
Rad 1: Ämnesrad: Som avtalat, [Förnamn] – BGFIX-broschyr ([2 relevanta produktkategorier] och mycket mer)
Rad 2: (tom)
Rad 3: Hej [Förnamn],
Rad 4: Tack för pratstunden om [kortare projektnamn] – [EN naturlig mening från anteckningarna, eller "det låter som ett spännande projekt" om inga anteckningar finns].
Rad 5: Jag bifogar vår broschyr som utlovat 😊
Rad 6: (tom)
Rad 7: De flesta känner oss för stängsel, grindar och portar, men hos BGFIX kan du få lösningar för hela projektets gång, till exempel:
Rad 8-11: • [3-4 produkter mest relevanta för ${pt} — välj ENBART från: Byggstängsel, Grindar till byggstängsel, Portar, Lätt avspärrning, Tung avspärrning, Publikstängsel, Säkerhetsräcken, Säkerhetsprodukter för betongarbete, Soldater/däckstöd, Spaghettimattor, Gångbroar]
Rad 12: (tom)
Rad 13: Det gör inköpsprocessen enkel och effektiv för dig – och du får:
Rad 14: • Ett brett sortiment med smarta lösningar
Rad 15: • Konkurrenskraftiga priser
Rad 16: • Leverans inom 24–48 timmar i hela Sverige och personlig service
Rad 17: (tom)
Rad 18: Du kan se hela vårt sortiment på www.bgfix.se
Rad 19: (tom)
Rad 20: Hör gärna av dig om det är något vi kan hjälpa till med, eller om du önskar en offert!
Rad 21: (tom)
Rad 22: Lycka till med projektet – fortsatt trevlig dag!
Rad 23: (tom)
Rad 24: *K.S. Om du redan har en idé om vilka produkter som är relevanta för [kortare projektnamn], skicka gärna en kort lista – så återkommer jag med priser och leveranstid samma dag.*

REGLER: Varm skandinavisk ton. Du-form. Max 200 ord i brödtext. ENDAST 😊 på rad 5. INGEN signatur. INGEN "Orlan" i slutet. Output = ENBART mejlet utan kommentarer.`}]
      })
    });
    const d=await resp.json();
    const txt=d.content?.[0]?.text||'';
    const lines=txt.trim().split('\n');
    let subj='',body='';
    for(let i=0;i<lines.length;i++){
      if(lines[i].trim()){
        subj=lines[i].replace(/^(Ämnesrad:|Ämne:|Subject:)\s*/i,'').trim();
        body=lines.slice(i+1).join('\n').trim();
        break;
      }
    }
    const se=document.getElementById('esub-'+id);
    const be=document.getElementById('ebody-'+id);
    if(se)se.value=subj;
    if(be)be.value=body;
    if(ld)ld.style.display='none';
    if(out){out.style.display='flex';}
  }catch(e){
    if(ld)ld.style.display='none';
    alert('AI-mejl kräver att appen hostas på en server (GitHub Pages). Allt annat fungerar lokalt.');
  }
}

function copyEmailDraft(id){
  const s=document.getElementById('esub-'+id)?.value||'';
  const b=document.getElementById('ebody-'+id)?.value||'';
  navigator.clipboard.writeText('Ämne: '+s+'\n\n'+b).then(()=>{
    const btn=document.getElementById('ecopy-'+id);
    if(btn){
      const orig=btn.innerHTML;
      btn.innerHTML='✓ Kopierat!';
      btn.style.cssText='background:#1D9E75;border-color:#1D9E75;color:#fff;font-size:12px';
      setTimeout(()=>{btn.innerHTML=orig;btn.removeAttribute('style');},3000);
    }
  });
}

function go(v){
  if(v!==V&&!v.startsWith('proj_'))prevV=V;

const TITLES={dash:'Dashboard',today:'Ring idag',pipeline:'Pipeline',all:'Alla projekt',orlan:'Orlans projekt',sales:'Passed to Sales',archive:'Arkiv',import:'Importera',add:'Lägg till projekt',search:'Sök projekt'};

function render(){
  const ct=document.getElementById('ct');
  const pt=document.getElementById('pt');
  if(TITLES[V])pt.textContent=TITLES[V];
  else if(REGS.includes(V))pt.textContent=V;
  else if(V.startsWith('proj_'))pt.textContent='Projekt';
  if(V==='dash')ct.innerHTML=rDash();
  else if(V==='today')ct.innerHTML=rToday(_ts);
  else if(V==='pipeline')ct.innerHTML=rPipeline();
  else if(V==='all')ct.innerHTML=rList(P.filter(p=>p.status!=='Complete'&&p.status!=='Passed to Sales'));
  else if(V==='orlan')ct.innerHTML=rList(P.filter(p=>p.assignee==='Orlan'&&p.status!=='Complete'&&p.status!=='Passed to Sales'),true);
  else if(REGS.includes(V))ct.innerHTML=rList(P.filter(p=>p.region===V&&p.status!=='Complete'&&p.status!=='Passed to Sales'));
  else if(V==='sales')ct.innerHTML=rSales();
  else if(V==='archive')ct.innerHTML=rArchive();
  else if(V==='import')ct.innerHTML=rImport();
  else if(V==='add')ct.innerHTML=rAdd();
  else if(V==='search')ct.innerHTML=rSearch();
  else if(V.startsWith('proj_'))ct.innerHTML=rProj(parseInt(V.slice(5)));
}

  const rgRows=REGS.map(r=>{const tot=P.filter(p=>p.region===r).length;const d=P.filter(p=>p.region===r&&(p.status==='Complete'||p.status==='Passed to Sales')).length;const rv=P.filter(p=>p.region===r&&p.status!=='Complete'&&p.status!=='Passed to Sales').reduce((a,p)=>a+(p.value||0),0);const pv=tot?Math.round(d/tot*100):0;return `<div class="pgrow"><div class="pglbl"><span class="rdot" style="background:${RC[r]}"></span>${r}</div><div class="pgbg"><div class="pgfill" style="width:${pv}%;background:${RC[r]}"></div></div><div class="pgpct">${pv}%</div><div style="font-size:10px;color:var(--text3);width:45px;text-align:right;flex-shrink:0">${rv?rv+'m':''}</div></div>`;}).join('');
  const urgRows=P.filter(p=>isToday(p)&&p.priority==='High').slice(0,3).map(p=>prow(p,'hot',true)).join('');
  return `${bnr}<div class="sg">
    <div class="sc"><div class="sc-l">Aktiva projekt</div><div class="sc-n">${active.length}</div><div class="sc-s">${totalVal} mSEK pipeline</div></div>
    <div class="sc"><div class="sc-l">Ring idag</div><div class="sc-n" style="color:#E24B4A">${ring}</div></div>
    <div class="sc"><div class="sc-l">Orlan</div><div class="sc-n" style="color:#534AB7">${allanN}</div><div class="sc-s">aktiva projekt</div></div>
    <div class="sc"><div class="sc-l">Orlan</div><div class="sc-n" style="color:#27500A">${orlanN}</div><div class="sc-s">aktiva projekt</div></div>
    <div class="sc"><div class="sc-l">Passed to Sales</div><div class="sc-n" style="color:#534AB7">${P.filter(p=>p.status==='Passed to Sales').length}</div><div class="sc-s">${ptsVal} mSEK</div></div>
    <div class="sc"><div class="sc-l">Complete</div><div class="sc-n" style="color:#1D9E75">${P.filter(p=>p.status==='Complete').length}</div></div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card"><div class="sec" style="margin-top:0">Pipeline — antal · värde</div>${funnel}</div>

  </div>

  ${urgRows||'<div class="card" style="font-size:13px;color:var(--text2);text-align:center;padding:24px">Inga hög-prioritet projekt att ringa just nu.</div>'}
  <button class="btn" style="margin-top:10px" onclick="go('today')">Visa alla att ringa idag →</button>`;
}

function rToday(sb){
  sb=sb||'priority';
  let list=P.filter(isToday).slice();
  if(sb==='value')list.sort((a,b)=>(b.value||0)-(a.value||0));
  else if(sb==='start')list.sort((a,b)=>(a.start||'9').localeCompare(b.start||'9'));
  else list.sort((a,b)=>(a.priority==='High'?0:a.priority==='Medium'?1:2)-(b.priority==='High'?0:b.priority==='Medium'?1:2));
  if(!list.length)return `<div class="card" style="text-align:center;padding:48px 24px"><i class="ti ti-circle-check" style="font-size:36px;color:#1D9E75;display:block;margin:0 auto 12px"></i><div style="font-size:15px;font-weight:600;margin-bottom:5px">Inga projekt att ringa idag</div><div style="font-size:13px;color:var(--text2)">Projekt som startar ${TM} eller ${NM} dyker upp här automatiskt.</div></div>`;

  const mo=list.filter(p=>p.followup!==TDS);
  const sortBar=`<div style="display:flex;gap:6px;margin-bottom:10px;align-items:center;flex-wrap:wrap">
    <span style="font-size:12px;color:var(--text2)">Sortera:</span>
    <button class="btn ${sb==='priority'?'btn-or':''}" style="font-size:11px;padding:4px 10px" onclick="rTodaySort('priority')">Prioritet</button>
    <button class="btn ${sb==='value'?'btn-or':''}" style="font-size:11px;padding:4px 10px" onclick="rTodaySort('value')">Värde ↓</button>

    <span style="margin-left:auto;font-size:12px;color:var(--text2)">${list.length} projekt</span></div>`;
  let h=`<div style="background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:10px;font-size:12px;color:var(--text2)">Visar projekt som startar <strong style="color:var(--text)">${TM}</strong> eller <strong style="color:var(--text)">${NM}</strong>, plus schemalagda följ-upp för idag.</div>${sortBar}`;
  if(fu.length){h+=`<div class="sec"><i class="ti ti-alarm" style="font-size:12px;vertical-align:-1px;margin-right:3px;color:#854F0B"></i> Schemalagda följ-upp idag (${fu.length})</div>`;fu.forEach(p=>{h+=prow(p,'fu',true);});}
  if(mo.length){h+=`<div class="sec" style="margin-top:${fu.length?'14px':'0'}"><i class="ti ti-calendar" style="font-size:12px;vertical-align:-1px;margin-right:3px"></i> Denna / nästa månad (${mo.length})</div>`;mo.sort((a,b)=>(a.priority==='High'?0:1)-(b.priority==='High'?0:1)).forEach(p=>{h+=prow(p,p.priority==='High'?'hot':'',true);});}
  return h;
}

function copyMail(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  const wish=document.getElementById('mw'+id)?.value.trim()||'';
  const txt=buildMailText(p,wish);
  const prev=document.getElementById('mprev'+id);
  if(prev)prev.textContent=txt;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn=document.getElementById('cpbtn'+id);
    if(btn){btn.classList.add('copied');btn.innerHTML='<i class="ti ti-check"></i> Kopierat!';setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<i class="ti ti-copy"></i> Kopiera mejl';},3000);}
  }).catch(()=>{if(prev){prev.select&&prev.select();} alert('Markera texten i förhandsgranskningen och kopiera med Ctrl+C.');});
}

function updMailPreview(id){
  const p=P.find(x=>x.id===id);if(!p)return;
  const wish=document.getElementById('mw'+id)?.value.trim()||'';
  const prev=document.getElementById('mprev'+id);if(prev)prev.textContent=buildMailText(p,wish);
}

function addUrl(id){const url=prompt('Klistra in Byggfakta URL:');if(!url||!url.trim())return;const p=P.find(x=>x.id===id);if(p){p.url=url.trim();sv();go('proj_'+id);}}
function updS(id,val){const p=P.find(x=>x.id===id);if(!p)return;p.status=val;sv();const pv=pc(p);const pb=document.getElementById('pb'+id);const pp=document.getElementById('pp'+id);if(pb){pb.style.width=pv+'%';pb.style.background=pv===100?'#1D9E75':'var(--orange)';}if(pp)pp.textContent=pv+'%';document.getElementById('tc').textContent=P.filter(isToday).length;render();}
function updF(id,f,v){const p=P.find(x=>x.id===id);if(p){p[f]=v;sv();}document.getElementById('tc').textContent=P.filter(isToday).length;}
function bookM(id){const d=document.getElementById('md'+id);if(!d||!d.value)return;const p=P.find(x=>x.id===id);if(p){p.logs.push({date:TDS,type:'Möte',note:'Möte bokat: '+d.value});p.followup=d.value;sv();go('proj_'+id);}}
function addLog(id){const t=document.getElementById('at'+id);const n=document.getElementById('an'+id);if(!n||!n.value.trim())return;const p=P.find(x=>x.id===id);if(p){p.logs.push({date:TDS,type:t.value,note:n.value.trim()});sv();const tl=document.getElementById('tl'+id);const c=ACOL[t.value]||'#888';if(tl)tl.insertAdjacentHTML('afterbegin',`<div class="tli"><div class="tldc"><div class="tld" style="background:${c}"></div></div><div style="flex:1"><div class="tdate">${TDS} · <span style="color:${c};font-weight:500">${t.value}</span></div><div class="tnote">${n.value.trim()}</div></div></div>`);n.value='';}}

function exportCSV(){
  const active=P.filter(p=>p.status!=='Complete');
  const rows=[['Projektnamn','Beställare','Totalentreprenör','Platschef','Telefon','Status','Prioritet','Region','Startar','Värde (mSEK)','Framsteg %','Följ-upp','Notes','Byggfakta URL','Ansvarig']];
  active.forEach(p=>rows.push([p.name,p.bestallare||'',p.company||'',p.contact||'',p.phone||'',p.status,p.priority,p.region,p.start||'',p.value||'',pc(p),p.followup||'',p.notes||'',p.url||'',p.assignee||'']));
  const csv=rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='BGFIX_Export_'+TDS+'.csv';a.click();
}
